{% extends 'base.html' %}

{% block title %}Forgot Password - CampusKart{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-lg">

                <div class="card-header bg-warning text-dark text-center py-4">
                    <h4 class="mb-0">
                        <i class="fas fa-unlock-alt me-2"></i>Forgot Password
                    </h4>
                    <p class="small mb-0 mt-2">
                        Enter your email and answer the security question
                    </p>
                </div>

                <div class="card-body p-4">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-envelope"></i>
                            </span>

                            <input type="hidden" id="csrfToken" value="{{ csrf_token }}">

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Enter your registered email"
                                required
                            >
                        </div>
                    </div>

                    <!-- Security Question -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Security Question</label>

                        <p class="text-muted small">
                            What is your favorite Food?
                        </p>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-palette"></i>
                            </span>

                            <input
                                type="text"
                                id="favoritefood"
                                class="form-control"
                                placeholder="Enter your favorite food"
                                required
                            >
                        </div>
                    </div>

                    <!-- New Password -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">New Password</label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>

                            <input
                                type="password"
                                id="newPassword"
                                class="form-control"
                                placeholder="Enter new password"
                                required
                            >
                        </div>

                        <small class="text-muted">
                            Minimum 8 characters
                        </small>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirm Password</label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-check-circle"></i>
                            </span>

                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-control"
                                placeholder="Confirm password"
                                required
                            >
                        </div>

                        <div id="passwordMatch" class="form-text"></div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2">

                        <button
                            type="button"
                            class="btn btn-success btn-lg"
                            id="resetPasswordBtn"
                            onclick="resetPassword()"
                            disabled
                        >
                            <i class="fas fa-save me-2"></i>Reset Password
                        </button>

                        <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                            Back to Login
                        </a>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<style>

.card{
    border-radius:20px;
}

.btn{
    border-radius:10px;
    padding:12px;
    font-weight:500;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

<script>

document.getElementById("confirmPassword").addEventListener("input", function(){

    const newPass = document.getElementById("newPassword").value;
    const confirmPass = this.value;

    const matchDiv = document.getElementById("passwordMatch");
    const btn = document.getElementById("resetPasswordBtn");

    if(confirmPass && newPass === confirmPass && newPass.length >= 8){

        matchDiv.innerHTML = '<span class="text-success">✓ Passwords match</span>';
        btn.disabled = false;

    } else {

        matchDiv.innerHTML = '<span class="text-danger">✗ Passwords do not match</span>';
        btn.disabled = true;

    }

});


function resetPassword(){

    const email = document.getElementById("email").value;
    const color = document.getElementById("favoritefood").value;
    const newPass = document.getElementById("newPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;
    const csrfToken = document.getElementById("csrfToken").value;

    const formData = new FormData();

    formData.append("email", email);
    formData.append("favorite_food", color);
    formData.append("new_password", newPass);
    formData.append("confirm_password", confirmPass);

    fetch("{% url 'forgot_password' %}",{

        method: "POST",

        headers:{
            "X-CSRFToken": csrfToken
        },

        body: formData

    })

    .then(response => response.json())

    .then(data => {

        if(data.status === "success"){

            alert("Password reset successful");
            window.location.href = "{% url 'login' %}";

        }else{

            alert(data.message);

        }

    })

    .catch(error => {

        console.error("Error:", error);
        alert("Error resetting password");

    });

}

</script>

{% endblock %}
