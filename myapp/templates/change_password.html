</div>

<style>
.card{
    border-radius:20px;
}

.btn{
    border-radius:10px;
    padding:12px;
    font-weight:500;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>

<script>

document.getElementById("confirmPassword").addEventListener("input", function(){

    const newPass = document.getElementById("newPassword").value
    const confirmPass = this.value

    const matchDiv = document.getElementById("passwordMatch")
    const btn = document.getElementById("resetPasswordBtn")

    if(confirmPass && newPass === confirmPass && newPass.length >= 8){

        matchDiv.innerHTML =
        '<span class="text-success">✓ Passwords match</span>'

        btn.disabled = false

    }else{

        matchDiv.innerHTML =
        '<span class="text-danger">✗ Passwords do not match</span>'

        btn.disabled = true
    }

})


function resetPassword(){

    const food =
    document.getElementById("favoritefood").value

    const newPass =
    document.getElementById("newPassword").value

    const confirmPass =
    document.getElementById("confirmPassword").value


    fetch("{% url 'change_password' %}",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded",

            "X-CSRFToken":"{{ csrf_token }}"
        },

        body:
        "favorite_food="+encodeURIComponent(food)
        +"&new_password="+encodeURIComponent(newPass)
        +"&confirm_password="+encodeURIComponent(confirmPass)

    })

    .then(response => response.json())

    .then(data => {

        if(data.status === "success"){

            alert("✅ Password updated successfully")

            window.location.href =
            "{% url 'profile' %}"

        }else{

            alert(data.message)
        }

    })

    .catch(error => {

        console.error(error)

        alert("Error updating password")

    })

}

</script>
